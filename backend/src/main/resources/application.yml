spring:
  application:
    name: privhealth-backend
  config:
    import: "optional:file:../.env[.properties]"
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/privhealthai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1kZXYtb25seS0xMjM0}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  crypto:
    aes-key: ${AES_KEY:YWVzLTI1Ni1nY20tc2VjcmV0LWtleS1mb3ItZGV2LTE=}
    hmac-key: ${HMAC_KEY:aG1hYy1zaGEyNTYtc2VjcmV0LWtleS1mb3ItZGV2LTE=}
  ml:
    base-url: ${ML_SERVICE_URL:http://localhost:8000}
    timeout-ms: 5000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true
  health:
    db:
      enabled: true

info:
  app:
    name: PrivHealth AI Backend
    version: 1.0.0
    description: Privacy-preserving healthcare risk prediction

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      mlService:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
  retry:
    instances:
      mlService:
        max-attempts: 2
        wait-duration: 1s
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
  timelimiter:
    instances:
      mlService:
        timeout-duration: 5s

logging:
  level:
    com.privhealth: DEBUG
    org.springframework.security: DEBUG
    io.github.resilience4j: INFO
