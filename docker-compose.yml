services:
  db:
    image: postgres:16
    container_name: privhealth-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-privhealthai}
      POSTGRES_USER: ${POSTGRES_USER:-privhealthai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-privhealthai}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-privhealthai} -d ${POSTGRES_DB:-privhealthai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: privhealth-ml
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: privhealth-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-privhealthai}
      - DB_USERNAME=${POSTGRES_USER:-privhealthai}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-privhealthai}
      - JWT_SECRET=${JWT_SECRET:-c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1kZXYtb25seS0xMjM0}
      - AES_KEY=${AES_KEY:-YWVzLTI1Ni1nY20tc2VjcmV0LWtleS1mb3ItZGV2LTE=}
      - HMAC_KEY=${HMAC_KEY:-aG1hYy1zaGEyNTYtc2VjcmV0LWtleS1mb3ItZGV2LTE=}
      - ML_SERVICE_URL=http://ml-service:8000
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: privhealth-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
